        e(SB,{Ic:SettingsIc,t:"settings",badge:0,label:"Mehr",onClick:function(){setShowSet(true);setOpenChat(null)}})
      )
    );
  }

  // DESKTOP LAYOUT
  return e("div",{style:{width:"100vw",height:"100vh",background:C.bg,color:C.txt,fontFamily:"'Segoe UI','Helvetica Neue',Arial,sans-serif",display:"flex",overflow:"hidden",fontSize:14}},
    // Sidebar
    e("div",{style:{width:56,background:C.panel,borderRight:"1px solid "+C.border,display:"flex",flexDirection:"column",alignItems:"center",paddingTop:12,gap:2,flexShrink:0}},
      e(SB,{Ic:ChatIc,t:"chats",badge:totalU}),
      e(SB,{Ic:PhoneIc,t:"calls",badge:0}),
      e(SB,{Ic:StatusIc,t:"status",badge:0}),
      e(SB,{Ic:ChannelIc,t:"channels",badge:0}),
      e(SB,{Ic:UsersIc,t:"communities",badge:0}),
      e("div",{style:{flex:1}}),
      e(SB,{Ic:SettingsIc,t:"settings",badge:0,onClick:function(){setShowSet(true);setOpenChat(null)}}),
      e("div",{style:{marginBottom:12,cursor:"pointer"}},Avatar({name:curUser?curUser.name:"AwiChat",size:32,color:C.blue}))
    ),

    // Panel
    e("div",{style:{width:340,background:C.panel,borderRight:"1px solid "+C.border,display:"flex",flexDirection:"column",flexShrink:0,overflow:"hidden"}},
      showSet?e(SettingsPanel,{user:curUser||{name:"AwiChat",email:"",phone:""},onClose:function(){setShowSet(false)},onLogout:function(){setScreen("login");setShowSet(false);setCurUser(null)}}):
      PanelContent()
    ),

    // Main
    openChat?e(Convo,{key:openChat.id,chat:openChat,onBack:function(){setOpenChat(null)},onCall:function(){setCallInfo({contact:openChat,isVideo:false})},onVideoCall:function(){setCallInfo({contact:openChat,isVideo:true})}}):
    e("div",{style:{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:C.deeper,borderLeft:"1px solid "+C.border}},
      e("div",{style:{textAlign:"center"}},
        e("div",{style:{margin:"0 auto 24px"}},e(LogoSvg,{size:100})),
        e("h2",{style:{fontSize:28,fontWeight:300,color:C.txt,margin:"0 0 4px"}},"AwiChat"),
        e("p",{style:{color:C.txt2,fontSize:16,margin:"0 0 10px"}},"Einfach chatten."),
        e("p",{style:{color:C.txt3,fontSize:14,maxWidth:380,margin:"0 auto 16px",lineHeight:1.6}},"Sende und empfange Nachrichten. Nutze AwiChat auf bis zu 4 verkn\u00FCpften Ger\u00E4ten gleichzeitig."),
        e("div",{style:{display:"flex",alignItems:"center",justifyContent:"center",gap:6,color:C.txt3,fontSize:13}},LockIc({color:C.txt3,size:14}),e("span",null,"Ende-zu-Ende-verschl\u00FCsselt"))
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(e(App));
</script>
